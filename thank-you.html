<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Plans Received | HardBid Consulting</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
:root{--navy:#05080F;--panel:rgba(14,22,38,.84);--line:#1A2436;--ink:#EAF0F7;--ink2:#AEB7C8;--gold:#E7A739;--gold2:#F3C266;--fd:'Space Grotesk',sans-serif;--fb:'Inter',sans-serif}*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;display:grid;place-items:center;background:#05080F;color:var(--ink);font-family:var(--fb);line-height:1.6;padding:24px}body:before{content:"";position:fixed;inset:0;z-index:-2;background:url('assets/bg-hero.jpg?v=3') center/cover no-repeat;filter:brightness(.68)}body:after{content:"";position:fixed;inset:0;z-index:-1;background:radial-gradient(800px 520px at 50% 15%,rgba(231,167,57,.16),transparent 62%),linear-gradient(180deg,rgba(5,8,15,.6),rgba(5,8,15,.94))}.card{width:min(760px,100%);text-align:center;background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:42px 28px;box-shadow:0 24px 70px rgba(0,0,0,.48)}.lion{height:120px;width:auto;margin:0 auto 12px;display:block;-webkit-mask-image:radial-gradient(ellipse closest-side at center,#000 62%,transparent 96%);mask-image:radial-gradient(ellipse closest-side at center,#000 62%,transparent 96%)}.title{width:min(560px,100%);height:auto;display:block;margin:0 auto 18px;filter:drop-shadow(0 6px 24px rgba(0,0,0,.62))}h1{font-family:var(--fd);font-size:clamp(2rem,5vw,3.4rem);line-height:1.08;margin-bottom:14px}h1 span{color:var(--gold)}p{color:var(--ink2);max-width:620px;margin:0 auto 24px}.actions{display:flex;justify-content:center;gap:14px;flex-wrap:wrap}.btn{display:inline-flex;align-items:center;justify-content:center;border-radius:10px;padding:13px 22px;font-family:var(--fd);font-weight:700;text-decoration:none}.primary{background:linear-gradient(145deg,var(--gold2),var(--gold));color:#1A1206}.ghost{border:1px solid #2A3854;color:var(--ink)}@media(max-width:560px){.card{padding:30px 18px}.lion{height:88px}.actions{flex-direction:column}.btn{width:100%}}
</style>
</head>
<body>
<main class="card">
  <img class="lion" src="assets/lion.png" alt="HardBid Consulting lion emblem" />
  <img class="title" src="assets/title.png?v=7" alt="HardBid Consulting" />
  <h1>Plans <span>Received</span></h1>
  <p>Thank you. Your project information was submitted to HardBid Consulting. We will review the intake and follow up using the contact information you provided.</p>
  <div class="actions">
    <a class="btn primary" href="/">Back to Website</a>
    <a class="btn ghost" href="https://calendly.com/freddyleonb7/30min" target="_blank" rel="noopener">Schedule a Consultation</a>
  </div>
</main>
</body>
</html>
